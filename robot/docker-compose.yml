services:
  telemetry:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ros2-telemetry
    restart: unless-stopped
    network_mode: host
    environment:
      # SERVER_URL: where telemetry POSTs land.
      #   http://localhost:5173 → SvelteKit dev server (recommended)
      #   http://localhost:3001 → standalone Express backend
      # On macOS/Windows, replace 'localhost' with 'host.docker.internal'.
      - SERVER_URL=${SERVER_URL:-http://localhost:5173}
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    command: >
      python3 telemetry_node.py --ros-args
      -p server_url:=${SERVER_URL:-http://localhost:5173}
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  camera_control:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ros2-camera-control
    restart: unless-stopped
    network_mode: host
    privileged: true
    devices:
      - /dev/gpiomem:/dev/gpiomem
    environment:
      - WS_HOST=${WS_HOST:-localhost:5173}
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    command: >
      python3 camera_control_node.py --ros-args
      -p server_url:=${WS_HOST:-localhost:5173}
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

