services:
  postgres:
    image: postgres:16-alpine
    container_name: ros2-yaboom-ihm
    restart: unless-stopped
    environment:
      POSTGRES_USER: ros2
      POSTGRES_PASSWORD: ros2
      POSTGRES_DB: ros2
    ports:
      - "127.0.0.1:5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ros2 -d ros2"]
      interval: 10s
      timeout: 5s
      retries: 5
    shm_size: 128mb
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  pgdata:
